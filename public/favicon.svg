<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Bosphoras favicon</title>
  <desc id="desc">Premium gold B monogram on a midnight navy background.</desc>

  <defs>
    <radialGradient id="bg" cx="35%" cy="18%" r="88%">
      <stop offset="0%" stop-color="#10213d"/>
      <stop offset="46%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#030812"/>
    </radialGradient>

    <linearGradient id="gold" x1="18%" y1="6%" x2="86%" y2="96%">
      <stop offset="0%" stop-color="#fff4b8"/>
      <stop offset="16%" stop-color="#ffd86a"/>
      <stop offset="34%" stop-color="#b97812"/>
      <stop offset="54%" stop-color="#f7cc5c"/>
      <stop offset="74%" stop-color="#a86b12"/>
      <stop offset="100%" stop-color="#5b3607"/>
    </linearGradient>

    <linearGradient id="edge" x1="8%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9ca"/>
      <stop offset="28%" stop-color="#f4c44d"/>
      <stop offset="64%" stop-color="#8c560c"/>
      <stop offset="100%" stop-color="#f4cf69"/>
    </linearGradient>

    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000" flood-opacity="0.48"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#ffd66e" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="92" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="86" fill="none" stroke="#ffffff" stroke-opacity="0.15"/>

  <g filter="url(#softShadow)">
    <text
      x="256"
      y="369"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', Times, serif"
      font-size="354"
      font-weight="700"
      letter-spacing="-18"
      fill="url(#gold)"
      stroke="url(#edge)"
      stroke-width="7"
      paint-order="stroke fill">
      B
    </text>

    <text
      x="256"
      y="369"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', Times, serif"
      font-size="354"
      font-weight="700"
      letter-spacing="-18"
      fill="none"
      stroke="#fff2a8"
      stroke-width="1.4"
      opacity="0.64">
      B
    </text>

    <text
      x="232"
      y="359"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', Times, serif"
      font-size="330"
      font-weight="700"
      letter-spacing="-18"
      fill="url(#shine)"
      opacity="0.32">
      B
    </text>
  </g>
</svg>
